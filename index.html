<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 실시간 환율 계산기</title>
<style>
    body {
        margin: 0;
        min-height: 100vh; /* height를 min-height로 변경하여 스크롤 허용 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top left, #1a1a2e, #16213e);
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: white;
        padding: 20px; /* 모바일 여백 추가 */
        box-sizing: border-box;
    }

    .card {
        width: 100%; /* 너비를 100%로 설정 */
        max-width: 420px; /* 최대 너비 제한 */
        padding: 30px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        box-sizing: border-box; /* 패딩 포함 너비 계산 */
    }

    @media (max-width: 400px) {
        .card {
            padding: 20px; /* 작은 화면에서 패딩 축소 */
        }
        .title {
            font-size: 22px; /* 제목 크기 축소 */
        }
        input {
            font-size: 18px; /* 입력창 폰트 축소 */
            padding: 14px 40px 14px 40px;
        }
    }

    .title {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 8px;
        text-align: center;
        background: linear-gradient(90deg, #84fab0 0%, #8fd3f4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .desc {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 30px;
        text-align: center;
    }

    .input-group {
        margin-bottom: 24px;
    }

    .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    label {
        font-size: 13px;
        color: #94a3b8;
        font-weight: 600;
    }

    select {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 6px 10px;
        border-radius: 10px;
        font-size: 13px;
        outline: none;
        cursor: pointer;
        transition: all 0.2s;
    }

    select:hover {
        background: rgba(255, 255, 255, 0.25);
    }

    option {
        background-color: #1e2a44;
        color: white;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    input {
        width: 100%;
        padding: 16px 45px 16px 45px; /* 양옆 공간 확보 */
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
        color: white;
        font-size: 20px;
        font-weight: 600;
        outline: none;
        transition: all 0.3s;
        box-sizing: border-box;
        -moz-appearance: textfield; /* 파이어폭스 기본 화살표 제거 */
    }

    /* 크롬, 사파리 등 기본 화살표 제거 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    input:focus {
        border-color: #8fd3f4;
        box-shadow: 0 0 15px rgba(143, 211, 244, 0.2);
    }

    .currency-symbol {
        position: absolute;
        left: 18px;
        color: #8fd3f4;
        font-weight: bold;
        font-size: 18px;
        pointer-events: none;
    }

    .spin-buttons {
        position: absolute;
        right: 12px;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .spin-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #94a3b8;
        width: 24px;
        height: 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.2s;
    }

    .spin-btn:hover {
        background: rgba(143, 211, 244, 0.3);
        color: white;
    }

    .divider {
        text-align: center;
        margin: -10px 0 15px 0;
        color: #8fd3f4;
        font-size: 24px;
        opacity: 0.7;
    }

    .rate-info {
        margin-top: 10px;
        padding: 20px;
        border-radius: 18px;
        background: rgba(143, 211, 244, 0.05);
        border: 1px solid rgba(143, 211, 244, 0.1);
        text-align: center;
    }

    .rate-text {
        font-size: 16px;
        font-weight: 600;
        color: #f1f5f9;
        margin-bottom: 6px;
    }

    .update-time {
        font-size: 11px;
        color: #64748b;
    }

    .status-badge {
        display: inline-block;
        font-size: 11px;
        padding: 4px 12px;
        border-radius: 20px;
        margin-bottom: 20px;
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
    }

    .status-badge:hover {
        background: rgba(16, 185, 129, 0.2);
        border-color: rgba(16, 185, 129, 0.3);
    }

    .refresh-hint {
        font-size: 10px;
        color: #64748b;
        margin-top: -15px;
        margin-bottom: 15px;
    }

    /* 탭 스타일 추가 */
    .tab-container {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        width: 100%;
        max-width: 420px;
    }

    .tab-btn {
        flex: 1;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #94a3b8;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }

    .tab-btn.active {
        background: rgba(143, 211, 244, 0.2);
        color: #8fd3f4;
        border-color: rgba(143, 211, 244, 0.3);
    }

    .tab-content {
        display: none;
        width: 100%;
        max-width: 420px;
    }

    .tab-content.active {
        display: block;
    }
</style>
</head>
<body>

<!-- 탭 메뉴 -->
<div class="tab-container">
    <button class="tab-btn active" onclick="openTab('calc-tab', this)">💱 계산기</button>
    <button class="tab-btn" onclick="openTab('contact-tab', this)">🤝 문의</button>
    <button class="tab-btn" onclick="openTab('comment-tab', this)">💬 댓글</button>
</div>

<!-- 환율 계산기 탭 -->
<div id="calc-tab" class="tab-content active">
    <div class="card">
        <div class="title">🌍 글로벌 환율 계산기</div>
        <div class="desc">실시간 금융 데이터 기반 자동 계산</div>

        <div style="text-align: center;">
            <div id="status" class="status-badge" onclick="fetchRates()">● 실시간 환율 연결됨 (클릭하여 갱신)</div>
            <div class="refresh-hint">* 글로벌 금융 데이터(Coinbase) 기반의 실시간 환율입니다.</div>
        </div>

        <!-- 외화 입력 -->
        <div class="input-group">
            <div class="label-row">
                <label id="foreignLabel">대상 통화 선택</label>
                <select id="currencySelect">
                    <option value="USD" selected>미국 달러 (USD)</option>
                    <option value="JPY">일본 엔 (JPY)</option>
                    <option value="EUR">유럽 유로 (EUR)</option>
                    <option value="CNY">중국 위안 (CNY)</option>
                    <option value="GBP">영국 파운드 (GBP)</option>
                </select>
            </div>
            <div class="input-wrapper">
                <span class="currency-symbol" id="foreignSymbol">$</span>
                <input type="number" id="foreignInput" placeholder="0.00" step="0.01">
                <div class="spin-buttons">
                    <button class="spin-btn" onclick="adjust('foreign', 1)">▲</button>
                    <button class="spin-btn" onclick="adjust('foreign', -1)">▼</button>
                </div>
            </div>
        </div>

        <div class="divider">⇅</div>

        <!-- 원화 입력 -->
        <div class="input-group">
            <div class="label-row">
                <label>대한민국 원 (KRW)</label>
            </div>
            <div class="input-wrapper">
                <span class="currency-symbol">₩</span>
                <input type="number" id="krwInput" placeholder="0">
                <div class="spin-buttons">
                    <button class="spin-btn" onclick="adjust('krw', 1000)">▲</button>
                    <button class="spin-btn" onclick="adjust('krw', -1000)">▼</button>
                </div>
            </div>
        </div>

        <div class="rate-info">
            <div class="rate-text" id="currentRateText">환율 정보를 불러오는 중...</div>
            <div class="update-time" id="lastUpdateTime">업데이트 확인 중</div>
        </div>
    </div>
</div>

<!-- 제휴 문의 탭 -->
<div id="contact-tab" class="tab-content">
    <div class="card">
        <div class="title" style="font-size: 20px;">🤝 제휴 문의</div>
        <div class="desc">서비스 제휴 및 기타 문의사항을 남겨주세요</div>

        <form action="https://formspree.io/f/xdapzkgo" method="POST" style="display: flex; flex-direction: column; gap: 12px;">
            <input type="text" name="name" placeholder="성함 또는 업체명" required style="padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2); color: white; outline: none; font-size: 14px; box-sizing: border-box;">
            <input type="email" name="_replyto" placeholder="이메일 주소" required style="padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2); color: white; outline: none; font-size: 14px; box-sizing: border-box;">
            <textarea name="message" placeholder="문의 내용" required style="padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2); color: white; height: 100px; resize: none; outline: none; font-size: 14px; font-family: inherit; box-sizing: border-box;"></textarea>
            <button type="submit" style="margin-top: 5px; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: bold; color: white; cursor: pointer; background: linear-gradient(90deg, #6a5cff, #00c6ff);">문의 보내기</button>
        </form>
    </div>
</div>

<!-- Disqus 댓글 탭 -->
<div id="comment-tab" class="tab-content">
    <div class="card">
        <div class="title" style="font-size: 20px; margin-bottom: 20px;">💬 댓글</div>
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://konkeul.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
</div>

<script>
    // 탭 전환 함수
    function openTab(tabId, btn) {
        const contents = document.getElementsByClassName('tab-content');
        const buttons = document.getElementsByClassName('tab-btn');
        
        for (let content of contents) content.classList.remove('active');
        for (let button of buttons) button.classList.remove('active');
        
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    const foreignInput = document.getElementById('foreignInput');
    const krwInput = document.getElementById('krwInput');
    const currencySelect = document.getElementById('currencySelect');
    const foreignSymbol = document.getElementById('foreignSymbol');
    const currentRateText = document.getElementById('currentRateText');
    const lastUpdateTime = document.getElementById('lastUpdateTime');
    const statusBadge = document.getElementById('status');

    let rates = {};
    const symbols = {
        'USD': '$',
        'JPY': '¥',
        'EUR': '€',
        'CNY': '¥',
        'GBP': '£'
    };

    // 숫자 조절 함수
    function adjust(type, amount) {
        const input = (type === 'foreign') ? foreignInput : krwInput;
        const currentVal = parseFloat(input.value) || 0;
        const newVal = Math.max(0, currentVal + amount);
        input.value = (type === 'foreign') ? newVal.toFixed(2) : Math.round(newVal);
        updateCalculation(type);
    }

    // 환율 정보 가져오기
    async function fetchRates() {
        statusBadge.innerText = '● 최신 정보를 가져오는 중...';
        try {
            const response = await fetch('https://api.coinbase.com/v2/exchange-rates?currency=KRW');
            const data = await response.json();
            
            if (data && data.data && data.data.rates) {
                const r = data.data.rates;
                rates = {
                    'USD': 1 / parseFloat(r.USD),
                    'JPY': 1 / parseFloat(r.JPY),
                    'EUR': 1 / parseFloat(r.EUR),
                    'CNY': 1 / parseFloat(r.CNY),
                    'GBP': 1 / parseFloat(r.GBP)
                };
                
                const now = new Date();
                statusBadge.innerText = '● 실시간 환율 연결됨 (클릭하여 갱신)';
                lastUpdateTime.innerText = `마지막 확인: ${now.toLocaleTimeString()} (실시간 데이터)`;
                updateCalculation();
            } else {
                throw new Error('데이터 구조 오류');
            }
        } catch (error) {
            console.error('환율 로드 오류:', error);
            statusBadge.innerText = '● 연결 오류 (재시도 클릭)';
        }
    }

    function updateCalculation(source) {
        if (Object.keys(rates).length === 0) return;
        
        const currency = currencySelect.value;
        const rateToKrw = rates[currency];
        
        foreignSymbol.innerText = symbols[currency];
        
        let displayRate = rateToKrw;
        let prefix = "1";
        if (currency === 'JPY') {
            displayRate = rateToKrw * 100;
            prefix = "100";
        }
        
        currentRateText.innerText = `현재 환율: ${prefix} ${currency} = ${displayRate.toLocaleString('ko-KR', {maximumFractionDigits: 2})} KRW`;

        if (source === 'foreign') {
            const val = parseFloat(foreignInput.value) || 0;
            krwInput.value = Math.round(val * rateToKrw);
        } else if (source === 'krw') {
            const val = parseFloat(krwInput.value) || 0;
            foreignInput.value = (val / rateToKrw).toFixed(2);
        } else {
            // 통화 변경 시(source가 없을 때) 항상 초기값으로 리셋
            foreignInput.value = (currency === 'JPY') ? 100 : 1;
            krwInput.value = Math.round(parseFloat(foreignInput.value) * rateToKrw);
        }
    }

    currencySelect.addEventListener('change', () => updateCalculation());
    foreignInput.addEventListener('input', () => updateCalculation('foreign'));
    krwInput.addEventListener('input', () => updateCalculation('krw'));

    fetchRates();
</script>

</body>
</html>
