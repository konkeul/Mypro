<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 환율 계산기</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top left, #1a1a2e, #16213e);
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: white;
    }

    .card {
        width: 400px;
        padding: 30px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .desc {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 24px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-size: 12px;
        color: #64748b;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
        color: white;
        font-size: 18px;
        outline: none;
        transition: all 0.3s;
    }

    input:focus {
        border-color: #4facfe;
        background: rgba(0, 0, 0, 0.4);
    }

    .currency-label {
        position: absolute;
        right: 16px;
        color: #4facfe;
        font-weight: bold;
        font-size: 14px;
    }

    .rate-info {
        margin-top: 24px;
        padding: 16px;
        border-radius: 12px;
        background: rgba(79, 172, 254, 0.1);
        border: 1px dashed rgba(79, 172, 254, 0.3);
        text-align: center;
    }

    .rate-text {
        font-size: 15px;
        color: #e2e8f0;
    }

    .update-time {
        font-size: 11px;
        color: #64748b;
        margin-top: 8px;
    }

    .loading {
        font-size: 12px;
        color: #4facfe;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="card">
    <div class="title">💱 실시간 환율 계산기</div>
    <div class="desc">USD ↔ KRW 자동 계산 (자동 업데이트)</div>

    <div id="status" class="loading">최신 환율 정보를 가져오는 중...</div>

    <div class="input-group">
        <label>미국 달러 (USD)</label>
        <div class="input-wrapper">
            <input type="number" id="usdInput" placeholder="0.00" step="0.01">
            <span class="currency-label">$</span>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 20px; color: #4facfe; font-size: 20px;">⇅</div>

    <div class="input-group">
        <label>대한민국 원 (KRW)</label>
        <div class="input-wrapper">
            <input type="number" id="krwInput" placeholder="0">
            <span class="currency-label">₩</span>
        </div>
    </div>

    <div class="rate-info">
        <div class="rate-text" id="currentRate">1 USD = 0 KRW</div>
        <div class="update-time" id="lastUpdate">업데이트 확인 중...</div>
    </div>
</div>

<script>
    const usdInput = document.getElementById('usdInput');
    const krwInput = document.getElementById('krwInput');
    const currentRateText = document.getElementById('currentRate');
    const lastUpdateText = document.getElementById('lastUpdate');
    const statusText = document.getElementById('status');

    let exchangeRate = 0;

    // 환율 정보 가져오기 (Open API 사용)
    async function fetchExchangeRate() {
        try {
            // exchangerate-api.com의 무료 엔드포인트 사용
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await response.json();
            
            if (data.result === 'success') {
                exchangeRate = data.rates.KRW;
                const lastTime = new Date(data.time_last_update_utc).toLocaleString();
                
                currentRateText.innerText = `현재 환율: 1 USD = ${exchangeRate.toLocaleString('ko-KR')} KRW`;
                lastUpdateText.innerText = `마지막 업데이트: ${lastTime}`;
                statusText.innerText = '✅ 최신 환율 정보가 적용되었습니다.';
                statusText.style.color = '#10b981';
                
                // 기본값 계산 (1달러 기준)
                usdInput.value = 1;
                krwInput.value = Math.round(exchangeRate);
            } else {
                throw new Error('데이터 로드 실패');
            }
        } catch (error) {
            console.error('환율 로드 오류:', error);
            statusText.innerText = '❌ 환율 정보를 가져오지 못했습니다.';
            statusText.style.color = '#ef4444';
        }
    }

    // 달러 입력 시 원화 계산
    usdInput.addEventListener('input', () => {
        if (!exchangeRate) return;
        const usdValue = parseFloat(usdInput.value) || 0;
        krwInput.value = Math.round(usdValue * exchangeRate);
    });

    // 원화 입력 시 달러 계산
    krwInput.addEventListener('input', () => {
        if (!exchangeRate) return;
        const krwValue = parseFloat(krwInput.value) || 0;
        usdInput.value = (krwValue / exchangeRate).toFixed(2);
    });

    // 페이지 로드 시 실행
    fetchExchangeRate();
</script>

</body>
</html>
