<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 실시간 환율 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --bg-gradient: radial-gradient(circle at top left, #1a1a2e, #16213e);
        --card-bg: rgba(255, 255, 255, 0.05);
        --text-main: white;
        --text-desc: #94a3b8;
        --input-bg: rgba(0, 0, 0, 0.3);
        --input-border: rgba(255, 255, 255, 0.1);
        --tab-bg: rgba(255, 255, 255, 0.05);
        --tab-text: #94a3b8;
        --rate-bg: rgba(143, 211, 244, 0.05);
        --rate-border: rgba(143, 211, 244, 0.1);
        --comment-bg: rgba(0, 0, 0, 0.2);
        --accent: #00c6ff;
    }

    [data-theme="light"] {
        --bg-gradient: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
        --card-bg: white;
        --text-main: #1e293b;
        --text-desc: #64748b;
        --input-bg: #f1f5f9;
        --input-border: #cbd5e1;
        --tab-bg: #e2e8f0;
        --tab-text: #64748b;
        --rate-bg: #f0f9ff;
        --rate-border: #bae6fd;
        --comment-bg: #f8fafc;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: var(--bg-gradient);
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: var(--text-main);
        padding: 20px;
        box-sizing: border-box;
        transition: background 0.3s, color 0.3s;
    }

    .theme-toggle {
        position: fixed; bottom: 25px; right: 25px;
        background: var(--card-bg); border: 1px solid var(--input-border); color: var(--text-main);
        padding: 10px 18px; border-radius: 30px; cursor: pointer; font-size: 13px;
        display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        z-index: 1000; transition: all 0.2s; backdrop-filter: blur(10px);
    }
    .theme-toggle:active { transform: scale(0.95); }

    .card {
        width: 100%; max-width: 420px; padding: 30px; border-radius: 28px;
        background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--input-border);
        box-shadow: 0 25px 60px rgba(0,0,0,0.2); box-sizing: border-box;
    }

    .title {
        font-size: 28px; font-weight: 800; margin-bottom: 10px; text-align: center;
        background: linear-gradient(90deg, #6a5cff, var(--accent));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .desc { font-size: 15px; color: var(--text-desc); margin-bottom: 25px; text-align: center; }

    .status-badge {
        display: inline-block; font-size: 12px; padding: 6px 15px; border-radius: 20px;
        margin-bottom: 30px; background: rgba(16, 185, 129, 0.1); color: #10b981 !important;
        font-weight: bold; cursor: pointer; border: 1px solid rgba(16, 185, 129, 0.2); transition: all 0.2s;
    }
    .status-badge:active { transform: scale(0.95); background: rgba(16, 185, 129, 0.2); }

    .input-group { margin-bottom: 24px; }
    .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    label { font-size: 14px; color: var(--text-desc); font-weight: 600; }

    select {
        background: var(--tab-bg); border: 1px solid var(--input-border); color: var(--text-main);
        padding: 6px 10px; border-radius: 10px; font-size: 13px; outline: none; cursor: pointer;
    }
    option { background: #1a1a2e; color: white; }
    [data-theme="light"] option { background: white; color: #1e293b; }

    .input-wrapper { position: relative; display: flex; align-items: center; }
    .calc-input {
        width: 100%; padding: 16px 20px 16px 45px; border-radius: 16px;
        border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main);
        font-size: 22px; font-weight: 600; outline: none; box-sizing: border-box; transition: all 0.3s;
    }

    .currency-symbol {
        position: absolute; left: 18px; color: var(--accent);
        font-weight: bold; font-size: 18px; pointer-events: none;
    }

    .slider-container { margin-top: 15px; padding: 0 5px; }
    .calc-slider {
        -webkit-appearance: none; width: 100%; height: 6px; border-radius: 5px;
        background: var(--input-border); outline: none; cursor: pointer;
    }
    .calc-slider::-webkit-slider-thumb {
        -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
        background: var(--accent); cursor: pointer; box-shadow: 0 0 10px rgba(0, 198, 255, 0.4);
    }

    .divider-container { text-align: center; position: relative; margin: 10px 0 20px 0; }
    .divider-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--input-border); z-index: 1; }
    .divider-text {
        position: relative; z-index: 2; background: var(--card-bg); padding: 5px 15px;
        border-radius: 20px; border: 1px solid var(--input-border); color: var(--accent);
        font-size: 14px; font-weight: bold; backdrop-filter: blur(10px);
    }

    .rate-info {
        margin-top: 15px; padding: 20px; border-radius: 18px;
        background: var(--rate-bg); border: 1px solid var(--rate-border); text-align: center;
    }

    .tab-container { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; max-width: 420px; }
    .tab-btn {
        flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--input-border);
        background: var(--tab-bg); color: var(--tab-text); font-size: 15px; font-weight: 600;
        cursor: pointer; transition: all 0.2s; text-align: center; text-decoration: none;
    }
    .tab-btn.active { background: rgba(0, 198, 255, 0.2); color: var(--accent); border-color: var(--accent); }

    .tab-content { display: none; width: 100%; max-width: 420px; }
    .tab-content.active { display: block; }

    .comment-list { display: flex; flex-direction: column; gap: 12px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
    .comment-item { padding: 12px; border-radius: 12px; background: var(--comment-bg); border: 1px solid var(--input-border); }

    .main-btn {
        width: 100%; padding: 16px; border-radius: 12px; border: none;
        font-size: 16px; font-weight: bold; color: white; cursor: pointer;
        background: linear-gradient(90deg, #6a5cff, var(--accent)); transition: all 0.2s;
    }
    .main-btn:active { transform: scale(0.98); opacity: 0.9; }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle">
    <span id="theme-icon">🌙</span> <span id="theme-text">다크 모드</span>
</button>

<div class="tab-container">
    <a href="#calculator" class="tab-btn active" id="btn-calculator">💱 계산기</a>
    <a href="#stock" class="tab-btn" id="btn-stock">📈 주식</a>
    <a href="#contact" class="tab-btn" id="btn-contact">🤝 문의</a>
    <a href="#comments" class="tab-btn" id="btn-comments">💬 댓글</a>
</div>

<div id="calculator" class="tab-content active">
    <div class="card">
        <div class="title">🌍 글로벌 환율 계산기</div>
        <div class="desc">실시간 금융 데이터 기반 자동 계산</div>
        <div style="text-align: center;">
            <div id="status" class="status-badge">● 실시간 환율 연결됨 (클릭하여 갱신)</div>
        </div>
        <div class="input-group">
            <div class="label-row">
                <label>대상 통화 선택</label>
                <select id="currencySelect">
                    <option value="USD" selected>미국 달러 (USD)</option>
                    <option value="JPY">일본 엔 (JPY)</option>
                    <option value="EUR">유럽 유로 (EUR)</option>
                    <option value="CNY">중국 위안 (CNY)</option>
                    <option value="GBP">영국 파운드 (GBP)</option>
                </select>
            </div>
            <div class="input-wrapper">
                <span class="currency-symbol" id="foreignSymbol">$</span>
                <input type="text" id="foreignInput" class="calc-input" placeholder="0.00">
            </div>
            <div class="slider-container">
                <input type="range" id="foreignSlider" class="calc-slider" min="0" max="10000" step="1" value="1">
            </div>
        </div>
        <div class="divider-container">
            <div class="divider-line"></div>
            <span class="divider-text">환산 결과</span>
        </div>
        <div class="input-group">
            <div class="label-row"><label>대한민국 원 (KRW)</label></div>
            <div class="input-wrapper">
                <span class="currency-symbol">₩</span>
                <input type="text" id="krwInput" class="calc-input" placeholder="0">
            </div>
            <div class="slider-container">
                <input type="range" id="krwSlider" class="calc-slider" min="0" max="15000000" step="1000" value="0">
            </div>
        </div>
        <div class="rate-info">
            <div id="currentRateText" style="font-weight: 600; margin-bottom: 5px; font-size: 16px;">환율 정보를 불러오는 중...</div>
            <div id="lastUpdateTime" style="font-size: 12px; color: var(--text-desc);">업데이트 확인 중</div>
        </div>
    </div>
</div>

<div id="stock" class="tab-content">
    <div class="card">
        <div class="title" style="font-size: 22px;">📈 실시간 주식 정보</div>
        
        <!-- 검색창 -->
        <div class="input-group" style="margin-top: 20px;">
            <div class="input-wrapper">
                <span class="currency-symbol">🔍</span>
                <input type="text" id="stockSearch" class="calc-input" placeholder="종목명 또는 코드 입력" style="font-size: 16px; padding-left: 45px;">
            </div>
            <button class="main-btn" style="margin-top: 10px; padding: 12px;" onclick="searchStock()">종목 검색</button>
        </div>

        <!-- 오늘의 추천 종목 -->
        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 10px; font-weight: bold; color: var(--accent);">⭐ 오늘의 추천 종목</label>
            <div class="comment-item" style="border-left: 4px solid #ff4d4d; background: rgba(255, 77, 77, 0.05);">
                <div style="display:flex; justify-content:space-between; align-items: center;">
                    <div>
                        <span id="recommendStockName" style="font-weight:bold; font-size: 16px;">삼성전자</span>
                        <span style="font-size: 12px; color: var(--text-desc); margin-left: 5px;">005930</span>
                    </div>
                    <div style="text-align: right;">
                        <div id="recommendStockPrice" style="color: #ff4d4d; font-weight: bold;">로딩 중...</div>
                        <div id="recommendStockChange" style="font-size: 12px; color: #ff4d4d;">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 인기 종목 리스트 -->
        <div>
            <label style="display: block; margin-bottom: 10px; font-weight: bold;">🔥 실시간 인기 종목</label>
            <div id="popularStocks" style="display: flex; flex-direction: column; gap: 10px;">
                <div class="comment-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
                    <span>1. SK하이닉스</span>
                    <span style="color: #ff4d4d; font-weight: 600;">▲ 2.5%</span>
                </div>
                <div class="comment-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
                    <span>2. 에코프로</span>
                    <span style="color: #4d94ff; font-weight: 600;">▼ 0.8%</span>
                </div>
                <div class="comment-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
                    <span>3. 현대차</span>
                    <span style="color: #ff4d4d; font-weight: 600;">▲ 1.1%</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="contact" class="tab-content">
    <div class="card">
        <div class="title" style="font-size: 22px;">🤝 제휴 문의</div>
        <form action="https://formspree.io/f/xdapzkgo" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" name="name" placeholder="성함 또는 업체명" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--input-border); background:var(--input-bg); color:var(--text-main); font-size:15px; box-sizing:border-box;">
            <input type="email" name="_replyto" placeholder="이메일 주소" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--input-border); background:var(--input-bg); color:var(--text-main); font-size:15px; box-sizing:border-box;">
            <textarea name="message" placeholder="문의 내용" required style="height: 120px; padding: 14px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size:15px; outline: none; resize: none; box-sizing:border-box;"></textarea>
            <button type="submit" class="main-btn">문의 보내기</button>
        </form>
    </div>
</div>

<div id="comments" class="tab-content">
    <div class="card">
        <div class="title" style="font-size: 22px; margin-bottom: 15px;">💬 실시간 댓글</div>
        <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:25px;">
            <input type="text" id="commentUser" placeholder="닉네임" style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--input-border); background:var(--input-bg); color:var(--text-main); font-size:15px; box-sizing:border-box;">
            <textarea id="commentInput" placeholder="댓글을 입력하세요..." style="height: 90px; padding:14px; border-radius:12px; border:1px solid var(--input-border); background:var(--input-bg); color:var(--text-main); resize:none; font-size:15px; box-sizing:border-box;"></textarea>
            <button id="addCommentBtn" class="main-btn">댓글 달기</button>
        </div>
        <div id="commentList" class="comment-list"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://fuboadrvmcrsfxutjmip.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1Ym9hZHJ2bWNyc2Z4dXRqbWlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDcxODUsImV4cCI6MjA5MDUyMzE4NX0.aFisTHVpvqmEjiFuN1a4sWMKz1zL7W99fT9Blco72Zs';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const elements = {
        foreignInput: document.getElementById('foreignInput'),
        krwInput: document.getElementById('krwInput'),
        foreignSlider: document.getElementById('foreignSlider'),
        krwSlider: document.getElementById('krwSlider'),
        currencySelect: document.getElementById('currencySelect'),
        foreignSymbol: document.getElementById('foreignSymbol'),
        currentRateText: document.getElementById('currentRateText'),
        lastUpdateTime: document.getElementById('lastUpdateTime'),
        themeIcon: document.getElementById('theme-icon'),
        themeText: document.getElementById('theme-text'),
        commentUser: document.getElementById('commentUser'),
        commentInput: document.getElementById('commentInput'),
        commentList: document.getElementById('commentList')
    };

    let rates = {};
    const symbols = {'USD':'$','JPY':'¥','EUR':'€','CNY':'¥','GBP':'£'};

    const format = (n) => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    const unformat = (s) => s.toString().replace(/,/g, '');

    function handleRouting() {
        const hash = window.location.hash || '#calculator';
        const tabId = hash.substring(1);
        
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tabId));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + tabId));
        
        if (!document.getElementById(tabId)) window.location.hash = '#calculator';
    }

    async function fetchRates() {
        try {
            const response = await fetch('https://api.coinbase.com/v2/exchange-rates?currency=KRW');
            const data = await response.json();
            if (data?.data?.rates) {
                const r = data.data.rates;
                rates = {'USD': 1/r.USD, 'JPY': 1/r.JPY, 'EUR': 1/r.EUR, 'CNY': 1/r.CNY, 'GBP': 1/r.GBP};
                elements.lastUpdateTime.innerText = `마지막 확인: ${new Date().toLocaleTimeString()} (실시간)`;
                updateCalculation();
            }
        } catch (e) { elements.currentRateText.innerText = '환율 로드 오류'; }
    }

    function updateCalculation(source) {
        const currency = elements.currencySelect.value;
        if (!rates[currency]) return;
        const rateToKrw = rates[currency];
        elements.foreignSymbol.innerText = symbols[currency];
        
        let displayRate = rateToKrw;
        let prefix = "1";
        if (currency === 'JPY') { displayRate = rateToKrw * 100; prefix = "100"; }
        elements.currentRateText.innerText = `현재 환율: ${prefix} ${currency} = ${format(displayRate.toFixed(2))} KRW`;

        // 슬라이더 범위 최적화
        if (currency === 'JPY') { elements.foreignSlider.max = 500000; elements.foreignSlider.step = 100; }
        else if (currency === 'CNY') { elements.foreignSlider.max = 50000; elements.foreignSlider.step = 10; }
        else { elements.foreignSlider.max = 10000; elements.foreignSlider.step = 1; }

        if (source === 'foreign') {
            const val = parseFloat(unformat(elements.foreignInput.value)) || 0;
            elements.krwInput.value = format(Math.round(val * rateToKrw));
            elements.foreignSlider.value = val;
            elements.krwSlider.value = Math.round(val * rateToKrw);
        } else if (source === 'krw') {
            const val = parseFloat(unformat(elements.krwInput.value)) || 0;
            const fVal = (val / rateToKrw).toFixed(2);
            elements.foreignInput.value = format(fVal);
            elements.krwSlider.value = val;
            elements.foreignSlider.value = fVal;
        } else {
            elements.foreignInput.value = currency === 'JPY' ? "100" : "1";
            const fVal = parseFloat(unformat(elements.foreignInput.value));
            elements.krwInput.value = format(Math.round(fVal * rateToKrw));
            elements.foreignSlider.value = fVal;
            elements.krwSlider.value = Math.round(fVal * rateToKrw);
        }
    }

    async function loadComments() {
        const { data } = await _supabase.from('comments').select('*').order('created_at', { ascending: false }).limit(50);
        if (!data) return;
        elements.commentList.innerHTML = data.map(c => `
            <div class="comment-item" style="margin-bottom: 10px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <span style="font-weight:bold; color:#00c6ff;">${c.user}</span>
                    <span style="font-size:11px; color:var(--text-desc);">${new Date(c.created_at).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
                </div>
                <div style="font-size:14px; line-height:1.5;">${c.text}</div>
            </div>
        `).join('') || '<div style="text-align:center; color:var(--text-desc); font-size:14px; margin-top:20px;">첫 댓글을 남겨보세요!</div>';
    }

    async function addComment() {
        const user = elements.commentUser.value.trim() || '익명';
        const text = elements.commentInput.value.trim();
        if (!text) return alert('내용을 입력해주세요!');
        const { error } = await _supabase.from('comments').insert([{ user, text }]);
        if (error) alert('오류: ' + error.message);
        else { elements.commentInput.value = ''; loadComments(); }
    }

    // 공통 데이터 페치 함수
    async function fetchStockData(symbol) {
        const proxyUrl = 'https://api.allorigins.win/get?url=';
        const targetUrl = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`);
        
        const response = await fetch(`${proxyUrl}${targetUrl}`);
        if (!response.ok) throw new Error('Network response was not ok');
        const json = await response.json();
        const data = JSON.parse(json.contents);
        
        if (!data.chart.result) throw new Error('No data found');
        return data.chart.result[0].meta;
    }

    async function searchStock() {
        const btn = document.querySelector('button[onclick="searchStock()"]');
        const query = document.getElementById('stockSearch').value.trim();
        if (!query) return alert('검색할 종목명을 입력해주세요!');
        
        const originalText = btn.innerText;
        btn.innerText = '검색 중...';
        btn.disabled = true;

        try {
            let symbol = /^\d+$/.test(query) ? `${query}.KS` : query;
            let meta;
            
            try {
                meta = await fetchStockData(symbol);
            } catch (e) {
                // 코스피에서 실패 시 코스닥(.KQ)으로 재시도
                if (symbol.endsWith('.KS')) {
                    symbol = symbol.replace('.KS', '.KQ');
                    meta = await fetchStockData(symbol);
                } else { throw e; }
            }

            const price = meta.regularMarketPrice;
            const changePercent = (((price - meta.previousClose) / meta.previousClose) * 100).toFixed(2);
            const isUp = changePercent >= 0;
            alert(`[${meta.symbol}] 현재가: ${format(price.toFixed(0))}원 (${isUp ? '▲' : '▼'} ${Math.abs(changePercent)}%)`);
        } catch (e) {
            alert('종목 정보를 가져오는데 실패했습니다. 종목코드 6자리를 확인해주세요. (예: 005930)');
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    async function updateStockInfo(symbol, type = 'recommend') {
        try {
            const meta = await fetchStockData(symbol);
            const price = meta.regularMarketPrice;
            const changePercent = (((price - meta.previousClose) / meta.previousClose) * 100).toFixed(2);
            const isUp = changePercent >= 0;

            if (type === 'recommend') {
                document.getElementById('recommendStockName').innerText = symbol === '005930.KS' ? '삼성전자' : meta.symbol;
                document.getElementById('recommendStockPrice').innerText = `${format(price.toFixed(0))}원`;
                document.getElementById('recommendStockChange').innerText = `${isUp ? '▲' : '▼'} ${Math.abs(changePercent)}%`;
                document.getElementById('recommendStockChange').style.color = isUp ? '#ff4d4d' : '#4d94ff';
            }
        } catch (e) { console.error('UpdateStockInfo Error:', e); }
    }

    async function loadPopularStocks() {
        const popularSymbols = ['005930.KS', '000660.KS', '005380.KS', '035420.KS', '035720.KS'];
        const names = {'005930.KS':'삼성전자', '000660.KS':'SK하이닉스', '005380.KS':'현대차', '035420.KS':'NAVER', '035720.KS':'카카오'};
        const listContainer = document.getElementById('popularStocks');
        
        listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-desc);">🚀 실시간 데이터 불러오는 중...</div>';

        try {
            // 모든 종목을 병렬로 동시에 요청 (속도 개선 핵심)
            const results = await Promise.allSettled(popularSymbols.map(s => fetchStockData(s)));
            
            let html = '';
            results.forEach((result, i) => {
                if (result.status === 'fulfilled') {
                    const meta = result.value;
                    const symbol = popularSymbols[i];
                    const price = meta.regularMarketPrice;
                    const changePercent = (((price - meta.previousClose) / meta.previousClose) * 100).toFixed(2);
                    const isUp = changePercent >= 0;
                    const name = names[symbol] || symbol;

                    html += `
                        <div class="comment-item" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 15px;">
                            <span style="font-weight:500;">${i+1}. ${name}</span>
                            <span style="color: ${isUp ? '#ff4d4d' : '#4d94ff'}; font-weight: 700;">${isUp ? '▲' : '▼'} ${Math.abs(changePercent)}%</span>
                        </div>
                    `;
                }
            });
            listContainer.innerHTML = html || '<div style="text-align:center; padding:10px;">데이터를 불러올 수 없습니다.</div>';
        } catch (e) {
            listContainer.innerHTML = '<div style="text-align:center; padding:10px;">로딩 오류가 발생했습니다.</div>';
        }
    }

    function toggleTheme() {
        const isLight = document.body.getAttribute('data-theme') === 'light';
        if (isLight) {
            document.body.removeAttribute('data-theme');
            elements.themeIcon.innerText = '🌙'; elements.themeText.innerText = '다크 모드';
            localStorage.setItem('theme', 'dark');
        } else {
            document.body.setAttribute('data-theme', 'light');
            elements.themeIcon.innerText = '☀️'; elements.themeText.innerText = '라이트 모드';
            localStorage.setItem('theme', 'light');
        }
    }

    // 이벤트 리스너 통합 설정
    window.addEventListener('hashchange', handleRouting);
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    document.getElementById('status').addEventListener('click', fetchRates);
    document.getElementById('addCommentBtn').addEventListener('click', addComment);
    
    elements.currencySelect.addEventListener('change', () => updateCalculation());
    elements.foreignInput.addEventListener('input', () => updateCalculation('foreign'));
    elements.krwInput.addEventListener('input', () => updateCalculation('krw'));
    elements.foreignSlider.addEventListener('input', (e) => { elements.foreignInput.value = format(e.target.value); updateCalculation('foreign'); });
    elements.krwSlider.addEventListener('input', (e) => { elements.krwInput.value = format(e.target.value); updateCalculation('krw'); });

    window.onload = () => {
        if (localStorage.getItem('theme') === 'light') toggleTheme();
        handleRouting();
        fetchRates();
        loadComments();
        loadPopularStocks();
        updateStockInfo('005930.KS', 'recommend');
        // 실시간 댓글 구독
        _supabase.channel('realtime-comments').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments' }, loadComments).subscribe();
    };
</script>
</body>
</html>
