<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 번호 추천기</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top left, #1e2a78, #0b0f2a);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.card {
    width: 450px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(20, 30, 60, 0.8);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
}

.desc {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 20px;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.main-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #6a5cff, #00c6ff);
}

.copy-btn {
    padding: 12px 15px;
    border-radius: 12px;
    border: 1px solid #444;
    background: transparent;
    color: white;
    cursor: pointer;
}

.option {
    margin-bottom: 15px;
    font-size: 13px;
    color: #ccc;
}

.result-box {
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
}

.row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 8px 0;
}

.ball {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    color: #111;
    font-size: 14px;
}

.blue { background: #5da9ff; }
.green { background: #6edc82; }
.red { background: #ff6b6b; }
.yellow { background: #ffd93d; }
.purple { background: #b388ff; }

.bonus {
    border: 2px solid #fff;
}

.time {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">🎲 로또 번호 추천기</div>
    <div class="desc">한 번에 1게임 번호를 생성합니다</div>

    <div class="btn-group">
        <button class="main-btn" onclick="generate()">번호 추천 받기</button>
        <button class="copy-btn" onclick="copyNumbers()">복사</button>
    </div>

    <div class="option">
        <input type="checkbox" id="bonusCheck"> 보너스 번호 포함
    </div>

    <div class="result-box" id="results"></div>
    <div class="time" id="time"></div>
</div>

<script>
let allResults = "";

function getColor(num) {
    if (num <= 10) return "yellow";
    if (num <= 20) return "blue";
    if (num <= 30) return "red";
    if (num <= 40) return "purple";
    return "green";
}

function generateOneSet(includeBonus) {
    let nums = [];

    while (nums.length < 6) {
        let n = Math.floor(Math.random() * 45) + 1;
        if (!nums.includes(n)) nums.push(n);
    }

    nums.sort((a, b) => a - b);

    let bonus = null;
    if (includeBonus) {
        do {
            bonus = Math.floor(Math.random() * 45) + 1;
        } while (nums.includes(bonus));
    }

    return { nums, bonus };
}

function generate() {
    const container = document.getElementById("results");
    container.innerHTML = "";
    allResults = "";

    const includeBonus = document.getElementById("bonusCheck").checked;

    for (let i = 0; i < 1; i++) {
        const { nums, bonus } = generateOneSet(includeBonus);

        const row = document.createElement("div");
        row.className = "row";

        nums.forEach(n => {
            const ball = document.createElement("div");
            ball.className = "ball " + getColor(n);
            ball.innerText = n;
            row.appendChild(ball);
        });

        if (bonus !== null) {
            const ball = document.createElement("div");
            ball.className = "ball " + getColor(bonus) + " bonus";
            ball.innerText = bonus;
            row.appendChild(ball);
        }

        container.appendChild(row);

        allResults += nums.join(", ") + (bonus ? " + " + bonus : "") + "\n";
    }

    const now = new Date();
    document.getElementById("time").innerText =
        `추천 완료! (${now.toLocaleString()})`;
}

function copyNumbers() {
    if (!allResults) return alert("먼저 번호를 생성하세요!");
    navigator.clipboard.writeText(allResults);
    alert("복사 완료!");
}
</script>

</body>
</html>
